name: Secret Scan
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Scan for Secrets & Env Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for env files in commit
        run: |
          FOUND=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '\.env$|railway\.env|\.env\.local|\.env\.production|\.env\.staging' | grep -v '\.example' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::🚨 Environment file detected in commit: $FOUND"
            echo "Remove the file and use environment variables in your hosting provider instead."
            exit 1
          fi
          echo "✅ No env files in commit"

      - name: Scan for hardcoded secret patterns
        run: |
          EXIT_CODE=0

          # AWS keys
          if git grep -lnI 'AKIA[0-9A-Z]\{16\}' -- ':!node_modules' ':!*.lock' ':!*.example' ':!*.yml' 2>/dev/null; then
            echo "::error::AWS access key pattern found"
            EXIT_CODE=1
          fi

          # Private keys
          if git grep -lnI '-----BEGIN.*PRIVATE KEY-----' -- ':!node_modules' ':!*.lock' 2>/dev/null; then
            echo "::error::Private key found in source"
            EXIT_CODE=1
          fi

          # Hardcoded JWT secrets (not in env files or examples)
          if git grep -nI 'jwt.*secret.*=.*["\x27][a-zA-Z0-9-]\{20,\}["\x27]' -- ':!node_modules' ':!*.lock' ':!*.example' ':!*.yml' ':!*.md' 2>/dev/null; then
            echo "::warning::Possible hardcoded JWT secret"
          fi

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ No hardcoded secrets found"
          fi
          exit $EXIT_CODE
