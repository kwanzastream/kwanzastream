name: Deploy to Staging
on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  NODE_ENV: staging

jobs:
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        working-directory: apps/server
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/server
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Build server
        working-directory: apps/server
        run: npx tsc

      - name: Build web
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}

      # Deploy to Railway (or your provider)
      # Uncomment and configure for your deployment target:
      #
      # - name: Deploy API to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: kwanza-api
      #
      # - name: Deploy Web to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     vercel-args: '--prod'

  smoke-tests:
    name: Smoke Tests
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Wait for deploy to be ready
        run: sleep 30

      - name: Health check
        run: |
          curl -f ${{ secrets.STAGING_API_URL }}/api/health || exit 1
          echo "✅ API is healthy"

      - name: Detailed health
        run: |
          HEALTH=$(curl -s ${{ secrets.STAGING_API_URL }}/api/health/detailed)
          echo "$HEALTH" | jq .
          echo "$HEALTH" | jq -e '.database == "healthy"' || (echo "❌ Database unhealthy" && exit 1)
          echo "✅ Database healthy"

      - name: Check critical endpoints respond
        run: |
          # Auth endpoints
          curl -s -o /dev/null -w "%{http_code}" ${{ secrets.STAGING_API_URL }}/api/auth/me | grep -q "401" && echo "✅ Auth endpoint responds"

          # Streams endpoint
          curl -sf ${{ secrets.STAGING_API_URL }}/api/streams/live > /dev/null && echo "✅ Streams endpoint responds"

          # Search endpoint
          curl -sf "${{ secrets.STAGING_API_URL }}/api/search?q=test" > /dev/null && echo "✅ Search endpoint responds"

          echo "✅ All smoke tests passed"
