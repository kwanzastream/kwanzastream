name: TestSprite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pytest
      - name: Run TestSprite tests
        env:
          API_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          cd testsprite_tests
          python -m pytest TC*.py -v --tb=short
        continue-on-error: false
