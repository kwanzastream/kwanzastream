name: CI — Full Pipeline
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  DATABASE_URL: postgresql://test:test@localhost:5432/kwanza_test
  JWT_ACCESS_SECRET: ci-test-access-secret-not-real
  JWT_REFRESH_SECRET: ci-test-refresh-secret-not-real
  RTMP_SECRET: ci-test-rtmp-secret
  MULTICAIXA_WEBHOOK_SECRET: ci-test-webhook-secret
  EMIS_WEBHOOK_SECRET: ci-test-emis-secret
  NODE_ENV: test

jobs:
  # ============== SERVER ==============
  server-tests:
    name: Server — Lint + Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kwanza_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: apps/server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: apps/server
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/server
        run: npx prisma migrate deploy

      - name: Build (typecheck)
        working-directory: apps/server
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: apps/server
        run: npx vitest run --coverage

  # ============== WEB ==============
  web-build:
    name: Web — Build + Typecheck
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Next.js
        working-directory: apps/web
        run: npm run build

  # ============== MIGRATION CHECK ==============
  migration-check:
    name: Migration Status
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kwanza_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: apps/server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: apps/server
        run: npx prisma generate

      - name: Check migration status
        working-directory: apps/server
        run: npx prisma migrate status

  # ============== SECURITY SCAN ==============
  security-scan:
    name: Security Patterns Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for dangerous patterns
        run: |
          echo "=== Checking for ignoreBuildErrors ==="
          ! grep -r "ignoreBuildErrors" apps/web/next.config* || (echo "❌ FAIL: ignoreBuildErrors found" && exit 1)
          echo "✅ No ignoreBuildErrors"

          echo "=== Checking for localStorage refresh tokens ==="
          ! grep -r "localStorage.*refresh" apps/web/lib/ apps/web/hooks/ || (echo "❌ FAIL: localStorage tokens found" && exit 1)
          echo "✅ No localStorage tokens"

          echo "=== Checking for hardcoded secrets ==="
          ! grep -rn "POSTGRES_PASSWORD.*=" apps/server/src/ apps/web/ --include="*.ts" --include="*.tsx" || echo "✅ No hardcoded DB passwords"

          echo "=== All security checks passed ==="
