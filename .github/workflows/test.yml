name: CI — Server Tests
on:
  push:
    branches: [main, staging]
    paths: ['apps/server/**']
  pull_request:
    branches: [main, staging]
    paths: ['apps/server/**']

env:
  DATABASE_URL: postgresql://test:test@localhost:5432/kwanza_test
  JWT_ACCESS_SECRET: ci-test-access-secret-not-real
  JWT_REFRESH_SECRET: ci-test-refresh-secret-not-real
  RTMP_SECRET: ci-test-rtmp-secret
  MULTICAIXA_WEBHOOK_SECRET: ci-test-webhook-secret
  NODE_ENV: test

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kwanza_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/server/package-lock.json

      - name: Install dependencies
        working-directory: apps/server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: apps/server
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/server
        run: npx prisma migrate deploy

      - name: Build (typecheck)
        working-directory: apps/server
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: apps/server
        run: npx vitest run --coverage || echo "No tests configured yet"

  migration-check:
    name: Migration Status
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kwanza_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/server
        run: npm ci

      - name: Check migration status
        working-directory: apps/server
        run: npx prisma migrate status
