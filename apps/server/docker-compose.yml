services:
  postgres:
    image: postgres:15-alpine
    container_name: kwanza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kwanza
      POSTGRES_PASSWORD: kwanza_secret_2024
      POSTGRES_DB: kwanza_stream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kwanza -d kwanza_stream" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kwanza-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
