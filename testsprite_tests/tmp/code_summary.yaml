version: "2"
type: backend
tech_stack:
  - TypeScript
  - Express
  - PostgreSQL
  - Prisma ORM
  - Redis (optional)
  - Socket.io
  - JWT + httpOnly cookies
features:
  - name: Authentication API
    description: Registo, login com password, refresh token, logout, OTP, Google OAuth, reset de password
    files:
      - apps/server/src/controllers/auth/loginController.ts
      - apps/server/src/controllers/auth/authHelpers.ts
      - apps/server/src/routes/authRoutes.ts
    endpoints:
      - method: POST
        path: /api/auth/register
        description: Registo com email, telefone, username e password
        auth_required: false
        response_schema:
          "201": "{ success, user }"
          "400": Validation or duplicate user
      - method: POST
        path: /api/auth/login
        description: Login com identifier (email/phone/username) e password
        auth_required: false
        response_schema:
          "200": "{ success, user }"
          "401": Invalid credentials
      - method: POST
        path: /api/auth/refresh
        description: Renovar access token via refresh token (cookie/body)
        auth_required: false
        response_schema:
          "200": "{ success }"
          "401": Invalid refresh
      - method: POST
        path: /api/auth/logout
        description: Revogar refresh token e limpar cookies
        auth_required: false
        response_schema:
          "200": "{ success }"
      - method: POST
        path: /api/auth/request-password-reset
        description: Pedido de reset de password por email
        auth_required: false
        response_schema:
          "200": Generic success message
      - method: POST
        path: /api/auth/reset-password
        description: Definir nova password com token
        auth_required: false
        response_schema:
          "200": Success
      - method: GET
        path: /api/auth/me
        description: Perfil do utilizador autenticado
        auth_required: true
        response_schema:
          "200": "{ user }"
          "401": Unauthorized
  - name: User profile and onboarding
    description: Actualização de perfil, onboarding, verificação de username
    files:
      - apps/server/src/controllers/userController.ts
      - apps/server/src/routes/userRoutes.ts
    endpoints:
      - method: PUT
        path: /api/users/me
        description: Actualizar perfil (username, displayName, bio, avatarUrl, etc.)
        auth_required: true
        response_schema:
          "200": "{ user }"
          "400": Validation or duplicate username
      - method: POST
        path: /api/users/onboarding
        description: Completar onboarding (displayName, username, bio, interests)
        auth_required: true
        response_schema:
          "200": "{ success, user }"
      - method: GET
        path: /api/users/check-username/:username
        description: Verificar disponibilidade de username
        auth_required: false
        response_schema:
          "200": "{ available }"
  - name: Avatar upload
    description: Upload de avatar com validação MIME e tamanho
    files:
      - apps/server/src/controllers/uploadController.ts
      - apps/server/src/routes/uploadRoutes.ts
    endpoints:
      - method: POST
        path: /api/upload/avatar
        description: Multipart upload de imagem de perfil
        auth_required: true
        response_schema:
          "200": "{ success, avatarUrl }"
          "400": Invalid type or size
known_limitations:
  - issue: Rate limit auth custom keyGenerator must use ipKeyGenerator for IPv6 (addressed in index.ts)
    location: apps/server/src/index.ts
    impact: Startup validation in express-rate-limit v8+
  - issue: RTMP node-media-server may throw unhandled rejection on some Node versions
    location: apps/server/src/streaming/mediaServer.ts
    impact: Log noise; API may still listen
