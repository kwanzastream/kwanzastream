version: "2"
type: backend
tech_stack:
  - TypeScript
  - Express
  - PostgreSQL
  - Prisma ORM
  - Redis optional
  - Socket.io
  - JWT + httpOnly cookies
features:
  - name: Authentication API
    description: Registo com defaults; cookies accessToken e refreshToken (camelCase); tokens também no JSON
    files:
      - apps/server/src/controllers/auth/loginController.ts
      - apps/server/src/controllers/auth/authHelpers.ts
      - apps/server/src/routes/authRoutes.ts
    endpoints:
      - method: POST
        path: /api/auth/register
        description: Registo — displayName opcional (default Utilizador), termsAccepted e ageConfirmed opcionais (default true). Password exige maiúscula, minúscula e dígito. Body mínimo email, phone, username, password.
        auth_required: false
        response_schema:
          "201": "{ success, user, accessToken, refreshToken }"
      - method: POST
        path: /api/auth/login
        description: Login; define cookies accessToken e refreshToken; body inclui accessToken e refreshToken
        auth_required: false
        response_schema:
          "200": "{ success, user, accessToken, refreshToken }"
      - method: POST
        path: /api/auth/refresh
        description: Cookie refreshToken ou body; resposta inclui accessToken e refreshToken
        auth_required: false
        response_schema:
          "200": "{ success, accessToken, refreshToken }"
      - method: POST
        path: /api/auth/logout
        description: Revoga refresh e limpa cookies
        auth_required: false
      - method: POST
        path: /api/auth/request-password-reset
        description: Pedido reset password
        auth_required: false
      - method: POST
        path: /api/auth/reset-password
        description: Reset com token
        auth_required: false
      - method: GET
        path: /api/auth/me
        description: Perfil autenticado — Bearer ou cookie accessToken
        auth_required: true
  - name: User profile and onboarding
    description: Perfil e onboarding
    files:
      - apps/server/src/controllers/userController.ts
      - apps/server/src/routes/userRoutes.ts
    endpoints:
      - method: PUT
        path: /api/users/me
        description: Actualizar perfil
        auth_required: true
      - method: POST
        path: /api/users/onboarding
        description: Completar onboarding
        auth_required: true
      - method: GET
        path: /api/users/check-username/:username
        description: Disponibilidade username
        auth_required: false
  - name: Avatar upload
    description: JPEG/PNG/WebP até 5MB
    files:
      - apps/server/src/controllers/uploadController.ts
      - apps/server/src/routes/uploadRoutes.ts
    endpoints:
      - method: POST
        path: /api/upload/avatar
        description: multipart file
        auth_required: true
        response_schema:
          "200": "{ success, avatarUrl }"
  - name: Content discovery
    description: Streams ao vivo, categorias, pesquisa, VODs
    files:
      - apps/server/src/controllers/streamController.ts
      - apps/server/src/controllers/searchController.ts
      - apps/server/src/controllers/vodController.ts
      - apps/server/src/routes/streamRoutes.ts
      - apps/server/src/routes/searchRoutes.ts
      - apps/server/src/routes/vodRoutes.ts
    endpoints:
      - method: GET
        path: /api/streams/live
        description: Lista streams ao vivo
        auth_required: false
      - method: GET
        path: /api/streams/categories
        description: Categorias de streams
        auth_required: false
      - method: GET
        path: /api/search
        description: Query q, type all|users|streams
        auth_required: false
      - method: GET
        path: /api/vods
        description: Lista VODs
        auth_required: false
      - method: GET
        path: /api/streams/user/:id
        description: Streams de um utilizador
        auth_required: false
  - name: Stream chat realtime
    description: Socket.io event chat-message com streamId e message; validação em chatFilter (vazio, 500 chars, PT-AO)
    files:
      - apps/server/src/streaming/chatService.ts
      - apps/server/src/streaming/chatFilter.ts
    endpoints:
      - method: SOCKET
        path: chat-message
        description: Emitir após join chat:streamId; requer autenticação socket
        auth_required: true
known_limitations:
  - issue: Chat de stream é WebSocket não REST; testes backend HTTP não cobrem envio de mensagem sem cliente Socket.io
    location: apps/server/src/streaming/chatService.ts
    impact: Prioridade 4 pode precisar testes frontend ou cliente socket
